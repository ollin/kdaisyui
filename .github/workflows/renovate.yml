name: Renovate

on:
  schedule:
    # Daily at 05:00 CET (04:00 UTC)
    - cron: '0 4 * * *'
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
